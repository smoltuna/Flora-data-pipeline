name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: flora
          POSTGRES_PASSWORD: flora
          POSTGRES_DB: flora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check backend/

      - name: Type check with mypy
        run: uv run mypy backend/ --ignore-missing-imports

      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://flora:flora@localhost:5432/flora
          LLM_PROVIDER: ollama  # tests mock the provider

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ env.PUSH == 'true' }}
          tags: ghcr.io/${{ github.repository_owner }}/flora-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ env.PUSH == 'true' }}
          tags: ghcr.io/${{ github.repository_owner }}/flora-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
