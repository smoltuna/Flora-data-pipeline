name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check backend/

      - name: Type check with mypy
        run: uv run mypy backend/ --ignore-missing-imports

      # Pull pgvector image with retry: Docker Hub on GitHub runners
      # periodically times out. Wrap the pull so a transient blip
      # doesn't fail the whole job.
      - name: Pull pgvector image (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 15
          command: docker pull pgvector/pgvector:pg17

      - name: Start postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_USER=flora \
            -e POSTGRES_PASSWORD=flora \
            -e POSTGRES_DB=flora \
            -p 5432:5432 \
            pgvector/pgvector:pg17
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U flora >/dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready in time" >&2
          docker logs postgres
          exit 1

      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://flora:flora@localhost:5432/flora
          LLM_PROVIDER: ollama  # tests mock the provider

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      # Pre-pull the buildkit image with retry so setup-buildx-action
      # doesn't fail when Docker Hub flakes.
      - name: Pre-pull buildkit (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 5
          retry_wait_seconds: 10
          command: docker pull moby/buildkit:buildx-stable-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Log in to ghcr.io
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ env.PUSH == 'true' }}
          tags: ghcr.io/${{ github.repository_owner }}/flora-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ env.PUSH == 'true' }}
          tags: ghcr.io/${{ github.repository_owner }}/flora-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
