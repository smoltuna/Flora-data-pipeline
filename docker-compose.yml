services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: flora
      POSTGRES_PASSWORD: flora
      POSTGRES_DB: flora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flora"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - /bin/bash
      - -c
      - |
        ollama serve &
        until ollama list > /dev/null 2>&1; do sleep 1; done
        ollama pull nomic-embed-text
        ollama pull llama3.2:3b
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 15s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 512M

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://flora:flora@postgres:5432/flora
      OLLAMA_BASE_URL: http://ollama:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      jaeger:
        condition: service_started
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    command: uv run --project /app uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
  mlflow_data:
